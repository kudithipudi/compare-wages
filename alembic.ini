# Alembic config for compare-wages.
#
# sqlalchemy.url is intentionally left empty here — alembic/env.py reads
# DATABASE_URL from the environment (falling back to the same default the
# app uses) so dev and prod share one source of truth with app/config.py.

[alembic]
# Location of the migration scripts directory (relative to this file).
script_location = alembic

# Revision filenames: <UTC timestamp>_<slug>.py so versions sort chronologically.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d%%(second).2d_%%(rev)s_%%(slug)s

# Use OS-local timezone for file_template timestamps. Comment out for UTC.
# timezone = UTC

# Max length of slug portion of the file name.
truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command,
# regardless of autogenerate.
revision_environment = false

# Set to 'true' to allow .pyc and .pyo files without a source .py file
# to be detected as revisions in the versions/ directory.
sourceless = false

# Version path separator — when using multiple version directories.
version_path_separator = os

# The output encoding used when revision files are written from script.py.mako.
output_encoding = utf-8

# Read by env.py only if env.py decides to honor this (it doesn't — see env.py).
# Left blank so a stray invocation can't talk to an unexpected database.
sqlalchemy.url =


[post_write_hooks]
# Hook section is intentionally empty. Add formatters (black, ruff) here if desired.


# Logging configuration — alembic CLI uses these.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
